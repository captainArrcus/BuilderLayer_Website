    const nodes = document.querySelectorAll("[data-i18n], [data-i18n-html]");
    const buttons = document.querySelectorAll(".lang-btn");

    function applyLanguage(lang) {
      const current = translations[lang] ? lang : "de";
      document.documentElement.lang = current;
      localStorage.setItem("builderlayer-language", current);

      buttons.forEach((button) => {
        const pressed = button.dataset.lang === current;
        button.setAttribute("aria-pressed", String(pressed));
      });

      nodes.forEach((node) => {
        const key = node.dataset.i18n || node.dataset.i18nHtml;
        const value = translations[current][key];
        if (!value) {
          return;
        }

        if (node.dataset.i18nHtml) {
          node.innerHTML = value;
        } else {
          node.textContent = value;
        }
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    const saved = localStorage.getItem("builderlayer-language") || "de";
    applyLanguage(saved);

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("in");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.14 }
    );

    document.querySelectorAll(".reveal").forEach((section) => observer.observe(section));
