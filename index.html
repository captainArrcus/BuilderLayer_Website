<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuilderLayer | Marcus Röper</title>
  <meta name="description" content="Marcus Röper spricht mit mittelständischen Fertigungsbetrieben über KI in der Robotik – bevor er baut.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-subtle: #f7f6f4;
      --text: #1a1a18;
      --text-muted: #5c5c58;
      --text-faint: #9c9c96;
      --border: rgba(26,26,24,0.12);
      --border-mid: rgba(26,26,24,0.20);
      --accent: #1a1a18;
      --radius-md: 8px;
      --radius-lg: 14px;
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --bg-subtle: #1e1e1b;
        --text: #f0efe9;
        --text-muted: #a8a89e;
        --text-faint: #666660;
        --border: rgba(240,239,233,0.10);
        --border-mid: rgba(240,239,233,0.18);
        --accent: #f0efe9;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── NAV ── */
    .site-header {
      border-bottom: 0.5px solid var(--border);
      padding: 18px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .lang-switch {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      background: none;
      border: 0.5px solid transparent;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      padding: 4px 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .lang-btn[aria-pressed="true"] {
      color: var(--text);
      border-color: var(--border-mid);
    }

    /* ── HERO ── */
    .hero {
      padding: 72px 0 64px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 22px;
      max-width: 580px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--text-muted);
    }

    .hero-copy {
      font-size: 16px;
      line-height: 1.75;
      color: var(--text-muted);
      max-width: 540px;
      margin-bottom: 32px;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      padding: 11px 22px;
      border-radius: var(--radius-md);
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.82; }

    .btn-ghost {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .btn-ghost:hover { color: var(--text); }

    /* ── SECTIONS ── */
    section {
      padding: 56px 0;
      border-top: 0.5px solid var(--border);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 20px;
    }

    section h2 {
      font-family: var(--font-serif);
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 400;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .lead {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 32px;
    }

    /* ── TRENDS ── */
    .trend-list {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .trend-item {
      display: flex;
      gap: 18px;
      padding: 20px 22px;
      border-bottom: 0.5px solid var(--border);
    }

    .trend-item:last-child { border-bottom: none; }

    .trend-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-faint);
      min-width: 22px;
      padding-top: 3px;
      flex-shrink: 0;
    }

    .trend-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .trend-body {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-muted);
    }

    /* ── FOUNDER ── */
    .founder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 560px) {
      .founder-grid { grid-template-columns: 1fr; }
    }

    .founder-card {
      background: var(--bg-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    .founder-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .founder-role {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .founder-bio {
      font-size: 14px;
      line-height: 1.68;
      color: var(--text-muted);
    }

    .cred-list {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .cred-item {
      padding: 14px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .cred-item:first-child { padding-top: 0; }
    .cred-item:last-child { border-bottom: none; padding-bottom: 0; }

    .cred-year {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      margin-bottom: 3px;
    }

    .cred-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    /* ── CALL ── */
    .call-box {
      background: var(--bg-subtle);
      border-radius: var(--radius-lg);
      padding: 36px;
    }

    .call-box h2 {
      font-family: var(--font-serif);
      font-size: clamp(20px, 3.5vw, 26px);
      font-weight: 400;
      margin-bottom: 14px;
      border: none;
      padding: 0;
    }

    .call-body {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-muted);
      max-width: 480px;
      margin-bottom: 22px;
    }

    .call-meta {
      display: flex;
      gap: 8px 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .call-meta span {
      font-size: 13px;
      color: var(--text-muted);
    }

    .call-meta span::before {
      content: "— ";
      color: var(--text-faint);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 28px 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: var(--text-faint);
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: var(--text-muted); }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .reveal.in {
      opacity: 1;
      transform: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">

  <main>

      <section class="reveal" id="founder">

        <div class="founder-grid">
          <div class="founder-card">
            <div class="avatar">MR</div>
            <div class="founder-name" data-i18n="founderName"></div>

          <ul class="cred-list">

              <div class="cred-year" data-i18n="cred4Year"></div>
              <div class="cred-text" data-i18n="cred4Text"></div>
            </li>
          </ul>
        </div>
      </section>

      <!-- CALL TO ACTION -->
      <section class="reveal" id="call" style="border-top: none; padding-top: 0;">
        <div class="call-box">
          <h2 data-i18n="callHeading"></h2>

          <a class="btn-primary" href="mailto:info@builderlayer.com?subject=Gespr%C3%A4ch%20anfragen" data-i18n="callCta"></a>
        </div>
      </section>

    </div>
  </main>

  <footer>
    <div class="wrap" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; width:100%;">
      <span data-i18n="footerLeft"></span>
      <div class="footer-links">
        <a href="./impressum.html" data-i18n="footerImprint"></a>
        <a href="./datenschutz.html" data-i18n="footerPrivacy"></a>
      </div>
    </div>
  </footer>

  <script>
    const CANONICAL_HOST = "";
    if (
      CANONICAL_HOST &&
      window.location.hostname.endsWith("github.io") &&
      window.location.hostname !== CANONICAL_HOST
    ) {
      window.location.replace(
        "https://" + CANONICAL_HOST + window.location.pathname + window.location.search + window.location.hash
      );
    }

    const translations = {
      de: {
        heroEyebrow: "Marcus Röper · Gründer",
        heroTitle: "Roboter werden intelligenter. <em>Was bedeutet das für Ihren Betrieb?</em>",
        heroCopy: "Ich komme aus der industriellen Automatisierung und beschäftige mich mit einer konkreten Frage: Wie können neue KI-Methoden in der Robotik auch für kleine und mittelständische Fertigungsbetriebe nutzbar werden – realistisch, nicht nur auf dem Papier.",
        heroCta: "Gespräch anfragen",
        heroCtaGhost: "Mehr erfahren ↓",
        trendsLabel: "Was sich gerade verändert",
        trendsHeading: "Drei Entwicklungen, die den Mittelstand betreffen",
        trendsLead: "In den letzten zwei Jahren hat sich in der Robotik mehr verändert als im gesamten Jahrzehnt davor. Nicht alles davon ist für kleinere Betriebe sofort relevant – aber einiges schon.",
        trend1Title: "Roboter lernen selbst",
        trend1Body: "Durch neue KI-Verfahren können Roboter zunehmend durch Vormachen neue Aufgaben erlernen – statt jeden Handgriff einzeln zu programmieren. Das senkt langfristig die Einstiegshürde, wirft aber neue Fragen auf.",
        trend2Title: "Einzelschritte vs. ganze Arbeitsabläufe",
        trend2Body: "Ein Roboter kann heute schleifen, greifen oder prüfen. Einen vollständigen Arbeitsablauf mit Fehlererkennung und Anpassung eigenständig durchführen – das kann bisher keiner zuverlässig. Genau dort liegt die entscheidende Frage.",
        trend3Title: "Großindustrie zieht vor, Mittelstand schaut zu",
        trend3Body: "Die aktuellen Lösungen zielen auf Konzerne mit eigenen Entwicklungsabteilungen. Für Betriebe mit 10 bis 200 Mitarbeitern gibt es bisher kaum passende Angebote – obwohl gerade sie vom Fachkräftemangel am stärksten betroffen sind.",
        founderLabel: "Zur Person",
        founderHeading: "Marcus Röper",
        founderName: "Marcus Röper",
        founderRole: "Gründer, BuilderLayer",
        founderBio: "Informatiker & Physiker mit Schwerpunkt Machine Learning. Mehrere Jahre Erfahrung mit KI in der industriellen Fertigung – zuletzt als Leiter einer KI-Abteilung, deren Arbeit zum Exit an Dassault Systèmes geführt hat. Jetzt beschäftige ich mich mit der Frage, wie intelligente Robotik auch für kleinere Betriebe zugänglich wird.",
        cred1Year: "2023",
        cred1Text: "Deutscher KI-Innovationspreis (KI Bundesverband) – Bilderkennungssystem im Bahnbereich",
        cred2Year: "2024–2025",
        cred2Text: "Leitung KI-Abteilung bei ASCon Systems – Begleitung des Exits an Dassault Systèmes",
        cred3Year: "2026",
        cred3Text: "Gründung BuilderLayer – Fokus auf intelligente Robotik für den Mittelstand",
        cred4Year: "Netzwerk",
        cred4Text: "Verbindungen zu Fraunhofer IAIS, Universität Bonn und ETH Zürich",
        callHeading: "Ein Gespräch auf Augenhöhe.",
        callBody: "Bevor ich eine Lösung baue, will ich verstehen, wie der Alltag in der Fertigung wirklich aussieht – direkt von den Menschen, die es jeden Tag erleben. Kein Verkaufsgespräch, keine Präsentation.",
        callMeta1: "20–30 Minuten",
        callMeta2: "Telefon, Video oder vor Ort",
        callMeta3: "Selbstverständlich vertraulich",
        callCta: "Gespräch anfragen →",
        footerLeft: "BuilderLayer · info@builderlayer.com",
        footerImprint: "Impressum",
        footerPrivacy: "Datenschutz"
      },
      en: {
        heroEyebrow: "Marcus Röper · Founder",
        heroTitle: "Robots are getting smarter. <em>What does that mean for your production?</em>",
        heroCopy: "I come from industrial automation and I am focused on one concrete question: how can new AI methods in robotics become practically useful for small and mid-size manufacturers – not just on paper.",
        heroCta: "Start a conversation",
        heroCtaGhost: "Learn more ↓",
        trendsLabel: "What is changing",
        trendsHeading: "Three developments that matter for SMEs",
        trendsLead: "More has changed in robotics over the last two years than in the entire decade before. Not all of it is immediately relevant for smaller manufacturers – but some of it is.",
        trend1Title: "Robots are learning on their own",
        trend1Body: "New AI methods allow robots to learn new tasks through demonstration rather than manual programming. This lowers the long-term barrier to entry – but also raises new questions.",
        trend2Title: "Single steps vs. full workflows",
        trend2Body: "A robot today can grind, grasp, or inspect. But completing an entire workflow independently – with error detection and adaptation – none can do that reliably yet. That is the key open question.",
        trend3Title: "Large industry moves first, SMEs watch",
        trend3Body: "Current solutions target large corporations with dedicated engineering teams. For manufacturers with 10 to 200 employees, suitable offerings are still rare – even though they face the greatest pressure from skilled labour shortages.",
        founderLabel: "About",
        founderHeading: "Marcus Röper",
        founderName: "Marcus Röper",
        founderRole: "Founder, BuilderLayer",
        founderBio: "Computer scientist and physicist focused on machine learning. Several years working on AI in industrial manufacturing – most recently leading an AI department through its exit to Dassault Systèmes. Now focused on making intelligent robotics accessible for smaller manufacturers.",
        cred1Year: "2023",
        cred1Text: "German AI Innovation Award (KI Bundesverband) – computer vision system for the railway sector",
        cred2Year: "2024–2025",
        cred2Text: "Head of AI at ASCon Systems – supported the exit process to Dassault Systèmes",
        cred3Year: "2026",
        cred3Text: "Founded BuilderLayer – focus on intelligent robotics for SME manufacturing",
        cred4Year: "Network",
        cred4Text: "Connections to Fraunhofer IAIS, University of Bonn and TU Munich",
        callHeading: "A practical conversation.",
        callBody: "Before I build a solution, I want to understand what production reality actually looks like – directly from the people who experience it every day. No sales pitch, no presentation.",
        callMeta1: "20–30 minutes",
        callMeta2: "Phone, video or on-site",
        callMeta3: "Confidential",
        callCta: "Start a conversation →",
        footerLeft: "BuilderLayer · info@builderlayer.com",
        footerImprint: "Legal Notice",
        footerPrivacy: "Privacy Policy"
      }
    };

    const i18nNodes = document.querySelectorAll("[data-i18n], [data-i18n-html]");
    const langBtns = document.querySelectorAll(".lang-btn");

    function applyLanguage(lang) {
      const current = translations[lang] ? lang : "de";
      document.documentElement.lang = current;
      localStorage.setItem("builderlayer-language", current);

      langBtns.forEach(btn => {
        btn.setAttribute("aria-pressed", String(btn.dataset.lang === current));
      });

      i18nNodes.forEach(node => {
        const key = node.dataset.i18n || node.dataset.i18nHtml;
        const value = translations[current][key];
        if (!value) return;
        if (node.dataset.i18nHtml) {
          node.innerHTML = value;
        } else {
          node.textContent = value;
        }
      });
    }

    langBtns.forEach(btn => {
      btn.addEventListener("click", () => applyLanguage(btn.dataset.lang));
    });

    const saved = localStorage.getItem("builderlayer-language") || "de";
    applyLanguage(saved);

    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("in");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.1 }
    );

    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
  </script>

</body>
